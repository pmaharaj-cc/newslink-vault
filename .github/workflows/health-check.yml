name: Pipeline Health Check

on:
  schedule:
    - cron: "0 14 * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for recent news commits
        run: |
          RECENT=$(git log --since='26 hours ago' --grep='^news:' --oneline -1)
          if [ -z "$RECENT" ]; then
            echo "::warning::No news: commit in the last 26 hours — Cloudflare worker may be down"
            exit 1
          fi
          echo "Pipeline healthy: $RECENT"